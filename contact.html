<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact - Infotech</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { font-family: 'Poppins', sans-serif; }

    .glass {
      backdrop-filter: blur(15px);
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .gradient-text {
      background: linear-gradient(to right, #4f46e5, #06b6d4);
      -webkit-background-clip: text;
      color: transparent;
    }
  </style>
</head>
<body class="bg-gray-950 text-white">

  <!-- Navbar -->
  <nav class="flex justify-between items-center px-6 py-4 bg-gray-900/80 backdrop-blur-md sticky top-0">
    <h1 class="text-xl font-bold gradient-text">Infotech</h1>
    <div class="space-x-6 hidden md:flex">
      <a href="index.html" class="hover:text-cyan-400">Home</a>
      <a href="courses.html" class="hover:text-cyan-400">Courses</a>
      <a href="verify.html" class="hover:text-cyan-400">Verify</a>
      <a href="#" class="text-cyan-400">Contact</a>
    </div>
  </nav>

  <!-- Header -->
  <section class="text-center py-16">
    <h2 class="text-4xl font-bold gradient-text">Contact Us</h2>
    <p class="text-gray-400 mt-2">Get in touch with us</p>
  </section>

  <!-- Contact Section -->
  <section class="grid md:grid-cols-2 gap-10 px-6 pb-20">

    <!-- Contact Info -->
    <div class="glass p-8 rounded-2xl space-y-4">
      <h3 class="text-2xl font-semibold">Contact Details</h3>
      <p>📍 A 208-209, Umiya Complex, Kamrej Char Rasta</p>
      <p>📞 9033280695</p>
      <p>📞 7984209957</p>

      <a href="https://wa.me/919033280695" target="_blank"
        class="inline-block bg-green-500 px-6 py-3 rounded-xl hover:bg-green-400">
        Chat on WhatsApp
      </a>

      <!-- Form -->
      <div class="mt-6 space-y-3">
        <input type="text" placeholder="Your Name"
          class="w-full px-4 py-3 rounded-xl bg-gray-900 border border-gray-700" />
        <input type="text" placeholder="Mobile Number"
          class="w-full px-4 py-3 rounded-xl bg-gray-900 border border-gray-700" />
        <textarea placeholder="Your Message"
          class="w-full px-4 py-3 rounded-xl bg-gray-900 border border-gray-700"></textarea>
        <button class="w-full bg-indigo-600 py-3 rounded-xl hover:bg-indigo-500">Send Message</button>
      </div>
    </div>

    <!-- Google Map -->
    <div class="rounded-2xl overflow-hidden">
      <iframe
        src="https://www.google.com/maps?q=Kamrej%20Char%20Rasta&output=embed"
        width="100%" height="100%" style="border:0; min-height:400px;" allowfullscreen="" loading="lazy">
      </iframe>
    </div>

  </section>

  <!-- Footer -->
  <footer class="py-10 text-center bg-gray-950 border-t border-gray-800">
    <p>© 2026 Infotech Computer Education</p>
  </footer>

</body>
</html>
